{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>🎰 Lucky Draw</title>
  <style>
    /* ── Hong Kong neon-night theme ──────────────────────────────────── */
    :root {
      --neon-pink:#ff2d95; --neon-cyan:#00e5ff; --neon-purple:#a855f7;
      --gold:#ffd54a; --jade:#1de9b6; --ink:#0a0414; --muted:#9aa0b4;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      margin:0; color:#f8fafc; min-height:100vh; overflow-x:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC",sans-serif;
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(255,45,149,.35), transparent 60%),
        radial-gradient(1000px 700px at 110% 10%, rgba(0,229,255,.30), transparent 55%),
        radial-gradient(900px 900px at 50% 120%, rgba(168,85,247,.30), transparent 60%),
        linear-gradient(160deg,#160726,#0a0414 70%);
      background-attachment:fixed;
    }
    /* faint neon "rain" grid for that Kowloon-alley feel */
    body::before {
      content:""; position:fixed; inset:0; pointer-events:none; opacity:.18;
      background:
        repeating-linear-gradient(90deg, rgba(0,229,255,.10) 0 1px, transparent 1px 40px),
        repeating-linear-gradient(0deg, rgba(255,45,149,.08) 0 1px, transparent 1px 40px);
      mask:linear-gradient(180deg, transparent, #000 30%, #000 70%, transparent);
    }
    .wrap { position:relative; max-width:480px; margin:0 auto; padding:18px 16px 56px; z-index:1; }
    .lang { text-align:right; margin-bottom:10px; }
    .lang button {
      background:rgba(255,255,255,.08); color:#e2e8f0; border:1px solid rgba(255,255,255,.16);
      border-radius:999px; padding:6px 13px; margin-left:6px; font-size:13px; cursor:pointer;
      backdrop-filter:blur(6px); transition:.2s;
    }
    .lang button.active {
      background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple));
      border-color:transparent; color:#fff; box-shadow:0 0 16px rgba(255,45,149,.6);
    }
    /* Hero */
    .hero { text-align:center; padding:6px 0 20px; }
    .hero .lantern { font-size:38px; line-height:1; filter:drop-shadow(0 0 12px rgba(255,213,74,.7));
      animation:sway 3.2s ease-in-out infinite; }
    @keyframes sway { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
    .hero .org { font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--neon-cyan);
      text-shadow:0 0 10px rgba(0,229,255,.7); margin-top:6px; }
    .hero h1 {
      font-size:28px; margin:8px 14px 6px; font-weight:800; line-height:1.2;
      color:#fff; text-shadow:0 0 18px rgba(255,45,149,.55), 0 0 4px rgba(0,229,255,.5);
    }
    .hero .win {
      display:inline-block; margin-top:8px; font-size:20px; font-weight:800;
      background:linear-gradient(90deg,var(--gold),#fff,var(--gold));
      background-size:200% auto; -webkit-background-clip:text; background-clip:text; color:transparent;
      animation:shine 3s linear infinite;
    }
    @keyframes shine { to { background-position:200% center; } }
    /* Glass card */
    .card {
      position:relative; background:rgba(20,12,38,.62); border:1px solid rgba(255,255,255,.12);
      border-radius:22px; padding:22px; backdrop-filter:blur(16px) saturate(140%);
      box-shadow:0 24px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.08);
    }
    .card::after { /* neon edge glow */
      content:""; position:absolute; inset:-1px; border-radius:22px; padding:1px; pointer-events:none;
      background:linear-gradient(135deg, rgba(255,45,149,.6), rgba(0,229,255,.5), rgba(168,85,247,.5));
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite:xor; mask-composite:exclude; opacity:.7;
    }
    label { display:block; font-size:13px; font-weight:700; margin:16px 0 7px; color:#cbd5e1;
      letter-spacing:.02em; }
    input[type=text], input[type=tel], input[type=email] {
      width:100%; padding:14px 15px; font-size:16px; color:#f8fafc;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.18); border-radius:13px;
      transition:.2s; outline:none;
    }
    input::placeholder { color:#64748b; }
    input:focus {
      border-color:var(--neon-cyan); background:rgba(0,229,255,.08);
      box-shadow:0 0 0 3px rgba(0,229,255,.18), 0 0 18px rgba(0,229,255,.25);
    }
    .consent { display:flex; gap:11px; align-items:flex-start; margin-top:18px; font-size:13px; color:#cbd5e1; }
    .consent input { margin-top:2px; width:20px; height:20px; accent-color:var(--neon-pink); }
    .privacy { font-size:12px; color:var(--muted); margin-top:11px; white-space:pre-wrap; line-height:1.5; }
    .btn {
      width:100%; margin-top:20px; padding:16px; border:0; border-radius:15px; cursor:pointer;
      color:#fff; font-size:17px; font-weight:800; letter-spacing:.02em;
      background:linear-gradient(95deg,var(--neon-pink),var(--neon-purple),var(--neon-cyan));
      background-size:200% auto; box-shadow:0 10px 30px rgba(255,45,149,.45);
      transition:.25s; animation:shine 4s linear infinite;
    }
    .btn:active { transform:translateY(1px) scale(.99); }
    .btn:disabled { opacity:.65; }
    .err { color:#ff6b81; font-size:13px; margin-top:11px; min-height:18px; text-shadow:0 0 8px rgba(255,107,129,.4); }
    .hidden { display:none; }
    /* Result reveal — slot-machine pop + glow */
    .reveal { text-align:center; }
    .reveal .badge {
      font-size:74px; font-weight:900; margin:8px 0; line-height:1;
      background:linear-gradient(90deg,var(--gold),#fff8d6,var(--gold));
      -webkit-background-clip:text; background-clip:text; color:transparent;
      filter:drop-shadow(0 0 26px rgba(255,213,74,.75));
      animation:pop .7s cubic-bezier(.18,.89,.32,1.28);
    }
    @keyframes pop { 0%{transform:scale(.2) rotate(-12deg);opacity:0} 70%{transform:scale(1.12)} 100%{transform:scale(1) rotate(0);opacity:1} }
    #congrats { font-size:19px; font-weight:800; color:#fff; text-shadow:0 0 14px rgba(255,45,149,.6); }
    .code {
      font-size:30px; letter-spacing:5px; font-weight:900; color:var(--ink);
      background:linear-gradient(90deg,var(--gold),#fff3b0); border-radius:13px;
      padding:14px; margin:16px 0; box-shadow:0 0 26px rgba(255,213,74,.45); user-select:all;
    }
    .meta { font-size:13px; color:#cbd5e1; }
    .share { margin-top:12px; }
    .note { font-size:13px; color:var(--jade); margin-top:14px; text-shadow:0 0 10px rgba(29,233,182,.4); }
    .center { text-align:center; }
    .spinner { display:inline-block; width:22px; height:22px; border:3px solid rgba(255,255,255,.35);
      border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
    /* Confetti */
    #confetti { position:fixed; inset:0; pointer-events:none; z-index:50; }
    .confetti-pc { position:absolute; width:9px; height:14px; top:-20px; opacity:.95;
      animation:fall linear forwards; }
    @keyframes fall { to { transform:translateY(110vh) rotate(720deg); opacity:.9; } }
    .powered { text-align:center; margin-top:22px; font-size:11px; color:#475569; letter-spacing:.08em; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="lang" id="langBar">
      <button data-lang="zh-TW">繁體</button>
      <button data-lang="zh-CN">简体</button>
      <button data-lang="en">EN</button>
    </div>

    <div class="hero">
      <div class="lantern">🏮</div>
      <div class="org" id="orgName"></div>
      <h1 id="campName"></h1>
      <div class="win" id="winLine"></div>
    </div>

    <!-- Not found -->
    <div class="card center hidden" id="notFound">
      <p id="notFoundText"></p>
    </div>

    <!-- Closed -->
    <div class="card center hidden" id="closed">
      <p id="closedText"></p>
    </div>

    <!-- Entry form -->
    <div class="card hidden" id="formCard">
      <form id="entryForm">
        <div id="fieldName" class="hidden">
          <label id="lblName"></label>
          <input type="text" id="name" autocomplete="name" />
        </div>
        <div id="fieldPhone" class="hidden">
          <label id="lblPhone"></label>
          <input type="tel" id="phone" autocomplete="tel" inputmode="tel" />
        </div>
        <div id="fieldEmail" class="hidden">
          <label id="lblEmail"></label>
          <input type="email" id="email" autocomplete="email" inputmode="email" />
        </div>
        <div id="fieldTable">
          <label id="lblTable"></label>
          <input type="text" id="table_number" inputmode="numeric" />
        </div>

        <div class="consent">
          <input type="checkbox" id="consent" />
          <label for="consent" id="consentText" style="margin:0;font-weight:400;"></label>
        </div>
        <div class="privacy" id="privacyText"></div>

        <div class="err" id="formErr"></div>
        <button type="submit" class="btn" id="submitBtn"></button>
      </form>
    </div>

    <!-- Result -->
    <div class="card reveal hidden" id="resultCard">
      <div id="resultWon">
        <div id="congrats" style="font-size:18px;font-weight:700;"></div>
        <div class="badge"><span id="discountPct"></span>%</div>
        <div class="meta" id="couponLabel"></div>
        <div class="code" id="couponCode"></div>
        <div class="meta" id="expiryLabel"></div>
        <div class="note hidden" id="waNote"></div>
        <button class="btn share hidden" id="shareBtn"></button>
      </div>
      <div id="resultLost" class="hidden">
        <div style="font-size:18px;font-weight:700;" id="thanksText"></div>
      </div>
    </div>

    <div class="powered">⚡ KRIBAAT</div>
  </div>

  <div id="confetti"></div>

  <script>
    var URL_TOKEN = "{{ url_token|escapejs }}";
    var REFERRAL_TOKEN = "{{ referral_token|escapejs }}";
    var DEFAULT_LANG = "{{ default_language|escapejs }}" || "zh-TW";
    var FOUND = {{ found|yesno:"true,false" }};

    var I18N = {
      "zh-TW": {
        win:"掃描贏取高達 {pct}% 折扣！", name:"姓名", phone:"電話", email:"電郵", table:"枱號（可選）",
        submit:"立即抽獎 🎁", drawing:"抽獎中…", congrats:"🎉 恭喜你中獎！", off:"折扣優惠",
        coupon:"優惠碼", expiry:"有效期至 ", thanks:"多謝參加！", waNote:"優惠券已透過 WhatsApp 發送給你 ✅",
        share:"分享給朋友賺取額外抽獎機會 🔗", notFound:"找不到此活動。", closed:"此活動暫未開放。",
        errRequired:"請填寫必填欄位。", errGeneric:"發生錯誤，請重試。",
        errDaily:"你今日已參加過了。", errEnded:"活動已結束。", errNotStarted:"活動尚未開始。",
      },
      "zh-CN": {
        win:"扫描赢取高达 {pct}% 折扣！", name:"姓名", phone:"电话", email:"邮箱", table:"桌号（可选）",
        submit:"立即抽奖 🎁", drawing:"抽奖中…", congrats:"🎉 恭喜你中奖！", off:"折扣优惠",
        coupon:"优惠码", expiry:"有效期至 ", thanks:"感谢参加！", waNote:"优惠券已通过 WhatsApp 发送给你 ✅",
        share:"分享给朋友赚取额外抽奖机会 🔗", notFound:"找不到此活动。", closed:"此活动暂未开放。",
        errRequired:"请填写必填栏位。", errGeneric:"发生错误，请重试。",
        errDaily:"你今天已参加过了。", errEnded:"活动已结束。", errNotStarted:"活动尚未开始。",
      },
      "en": {
        win:"Scan to win up to {pct}% off!", name:"Name", phone:"Phone", email:"Email", table:"Table no. (optional)",
        submit:"Spin to win 🎁", drawing:"Drawing…", congrats:"🎉 You won!", off:"discount",
        coupon:"Coupon code", expiry:"Valid until ", thanks:"Thanks for entering!", waNote:"Your coupon was sent to WhatsApp ✅",
        share:"Share to earn a bonus entry 🔗", notFound:"Campaign not found.", closed:"This campaign is not open yet.",
        errRequired:"Please fill in the required fields.", errGeneric:"Something went wrong, please try again.",
        errDaily:"You've already entered today.", errEnded:"This campaign has ended.", errNotStarted:"This campaign hasn't started.",
      }
    };

    var lang = DEFAULT_LANG in I18N ? DEFAULT_LANG : "zh-TW";
    var config = null;
    var idemKey = (Date.now().toString(36) + Math.random().toString(36).slice(2));

    function t(k){ return (I18N[lang] && I18N[lang][k]) || I18N["zh-TW"][k] || k; }
    function $(id){ return document.getElementById(id); }
    function show(id){ $(id).classList.remove("hidden"); }
    function hide(id){ $(id).classList.add("hidden"); }

    function setLangButtons(){
      var btns = document.querySelectorAll("#langBar button");
      for (var i=0;i<btns.length;i++){
        btns[i].classList.toggle("active", btns[i].getAttribute("data-lang")===lang);
        btns[i].onclick = (function(b){ return function(){ lang=b.getAttribute("data-lang"); renderTexts(); }; })(btns[i]);
      }
    }

    function renderTexts(){
      if (!config) return;
      $("orgName").textContent = config.organization_name || "";
      $("campName").textContent = config.name || "";
      $("winLine").textContent = t("win").replace("{pct}", config.max_discount || 0);
      $("lblName").textContent = t("name");
      $("lblPhone").textContent = t("phone");
      $("lblEmail").textContent = t("email");
      $("lblTable").textContent = t("table");
      $("consentText").textContent = config.consent_text || "";
      $("privacyText").textContent = config.privacy_notice_text || "";
      $("submitBtn").textContent = t("submit");
      $("notFoundText").textContent = t("notFound");
      $("closedText").textContent = t("closed");
      setLangButtons();
    }

    function mapErr(reason){
      if (reason==="daily_limit_reached"||reason==="total_limit_reached") return t("errDaily");
      if (reason==="campaign_ended") return t("errEnded");
      if (reason==="campaign_not_started"||reason==="campaign_not_active") return t("errNotStarted");
      if (reason==="missing_required_fields") return t("errRequired");
      return t("errGeneric");
    }

    function loadConfig(){
      fetch("/public/lucky-draw/"+URL_TOKEN+"/config/", {headers:{"Accept":"application/json"}})
        .then(function(r){ if(!r.ok) throw new Error("nf"); return r.json(); })
        .then(function(c){
          config = c; renderTexts();
          if (!c.is_open){ show("closed"); return; }
          if (c.requires_name) show("fieldName");
          if (c.requires_phone) show("fieldPhone");
          if (c.requires_email) show("fieldEmail");
          show("formCard");
        })
        .catch(function(){ renderTexts(); show("notFound"); });
    }

    function submitEntry(e){
      e.preventDefault();
      $("formErr").textContent = "";
      var btn = $("submitBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> ' + t("drawing");

      var body = {
        name: $("name").value, phone: $("phone").value, email: $("email").value,
        table_number: $("table_number").value, consent_given: $("consent").checked,
        referral_token: REFERRAL_TOKEN, idempotency_key: idemKey
      };

      fetch("/public/lucky-draw/"+URL_TOKEN+"/enter/", {
        method:"POST", headers:{"Content-Type":"application/json","Accept":"application/json"},
        body: JSON.stringify(body)
      }).then(function(r){ return r.json().then(function(d){ return {ok:r.ok, status:r.status, data:d}; }); })
        .then(function(res){
          if (!res.ok){
            $("formErr").textContent = mapErr(res.data && res.data.detail);
            btn.disabled = false; btn.textContent = t("submit");
            return;
          }
          showResult(res.data);
        })
        .catch(function(){
          $("formErr").textContent = t("errGeneric");
          btn.disabled = false; btn.textContent = t("submit");
        });
    }

    function burstConfetti(){
      var c = $("confetti"); if (!c) return;
      var colors = ["#ff2d95","#00e5ff","#a855f7","#ffd54a","#1de9b6","#ffffff"];
      for (var i=0;i<70;i++){
        var p = document.createElement("div");
        p.className = "confetti-pc";
        p.style.left = Math.random()*100 + "vw";
        p.style.background = colors[i % colors.length];
        p.style.animationDuration = (1.8 + Math.random()*1.8) + "s";
        p.style.animationDelay = (Math.random()*0.5) + "s";
        p.style.transform = "rotate(" + (Math.random()*360) + "deg)";
        c.appendChild(p);
        (function(node){ setTimeout(function(){ node.remove(); }, 4200); })(p);
      }
    }

    function showResult(d){
      hide("formCard"); show("resultCard");
      if (d.won){
        hide("resultLost"); show("resultWon");
        burstConfetti();
        if (navigator.vibrate){ navigator.vibrate([20,40,20]); }
        $("congrats").textContent = t("congrats");
        $("discountPct").textContent = d.discount_percent;
        $("couponLabel").textContent = t("coupon");
        $("couponCode").textContent = d.coupon_code;
        if (d.expires_at){
          $("expiryLabel").textContent = t("expiry") + d.expires_at.slice(0,10);
        }
        if (config.referral_enabled && d.share_text && d.referral_url){
          var shareBtn = $("shareBtn");
          shareBtn.textContent = t("share");
          shareBtn.classList.remove("hidden");
          shareBtn.onclick = function(){
            var waUrl = "https://wa.me/?text=" + encodeURIComponent(d.share_text);
            if (navigator.share){
              navigator.share({text:d.share_text, url:d.referral_url}).catch(function(){ window.location.href=waUrl; });
            } else {
              window.location.href = waUrl;
            }
          };
        }
        // Coupon delivery confirmation (server sends async if consent given).
        $("waNote").textContent = t("waNote");
        if ($("consent").checked){ show("waNote"); }
      } else {
        hide("resultWon"); show("resultLost");
        $("thanksText").textContent = t("thanks");
      }
    }

    document.addEventListener("DOMContentLoaded", function(){
      $("entryForm").addEventListener("submit", submitEntry);
      if (!FOUND){ renderTexts(); show("notFound"); return; }
      loadConfig();
    });
  </script>
</body>
</html>
