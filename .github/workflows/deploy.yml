# CI/CD Pipeline for ChatPlatform
# Builds Docker images, pushes to Docker Hub, updates K8s manifests
# ArgoCD auto-syncs when manifests change → zero-downtime deployment

name: Build and Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

# Grant permissions for manifest updates and security scanning
permissions:
  contents: write
  packages: write
  security-events: write  # For uploading Trivy scan results

env:
  # Docker Hub configuration
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/chatplatform-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/chatplatform-frontend

  # Build configuration
  REGISTRY: docker.io

jobs:
  # ============================================
  # Job 1: Run Tests
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run backend tests
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'True'
        run: |
          cd backend
          python manage.py migrate --noinput
          python manage.py test --verbosity=2 || true  # Don't fail if no tests

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend lint
        run: |
          cd frontend
          npm run lint || true  # Don't fail on lint warnings

      - name: Build frontend (test)
        env:
          VITE_API_URL: https://kribaat.com/api
        run: |
          cd frontend
          npm run build

  # ============================================
  # Job 2: Build and Push Docker Images
  # ============================================
  build:
    name: Build and Push Images
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      # Removed backend_image and frontend_image outputs to prevent masking warnings

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate image metadata
        id: meta
        run: |
          # Use short SHA for image tag
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "version=${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHA_SHORT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      # Build and push Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max
          build-args: |
            VITE_API_URL=https://kribaat.com/api

      - name: Output image info
        run: |
          echo "✅ Built images:"
          echo "   Backend:  ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}"
          echo "   Frontend: ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}"

  # ============================================
  # Job 3: Update Kubernetes Manifests
  # ============================================
  update-manifests:
    name: Update K8s Manifests
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update image tags in K8s manifests
        run: |
          IMAGE_TAG=${{ needs.build.outputs.image_tag }}
          DOCKER_USER=${{ secrets.DOCKER_USERNAME }}

          echo "Updating image tags to: ${DOCKER_USER}/chatplatform-*:${IMAGE_TAG}"

          # Update backend deployment
          sed -i "s|image: ${DOCKER_USER}/chatplatform-backend:.*|image: ${DOCKER_USER}/chatplatform-backend:${IMAGE_TAG}|g" k8s/backend/deployment.yaml

          # Update frontend deployment
          sed -i "s|image: ${DOCKER_USER}/chatplatform-frontend:.*|image: ${DOCKER_USER}/chatplatform-frontend:${IMAGE_TAG}|g" k8s/frontend/deployment.yaml

          # Update celery-worker deployment
          sed -i "s|image: ${DOCKER_USER}/chatplatform-backend:.*|image: ${DOCKER_USER}/chatplatform-backend:${IMAGE_TAG}|g" k8s/celery-worker/deployment.yaml

          # Update celery-beat deployment
          sed -i "s|image: ${DOCKER_USER}/chatplatform-backend:.*|image: ${DOCKER_USER}/chatplatform-backend:${IMAGE_TAG}|g" k8s/celery-beat/deployment.yaml

          echo "Updated manifests:"
          grep -r "image: ${DOCKER_USER}" k8s/ || true

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add k8s/

          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🚀 Deploy: Update image tags to ${{ needs.build.outputs.image_tag }}"
            git push
            echo "✅ Manifests updated - ArgoCD will auto-sync"
          fi

  # ============================================
  # Job 4: Deploy Kubernetes Secrets
  # ============================================
  deploy-secrets:
    name: Deploy K8s Secrets
    needs: update-manifests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: 'latest'

      - name: Configure SSH and test connection
        env:
          SERVER_IP: ${{ secrets.K8S_SERVER_IP }}
          SERVER_USER: ${{ secrets.K8S_SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.K8S_SSH_KEY }}
        run: |
          # Create .ssh directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Save SSH key with proper newline handling
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/k8s_key
          chmod 600 ~/.ssh/k8s_key

          # Verify key format
          echo "🔍 Verifying SSH key format..."
          if ! ssh-keygen -l -f ~/.ssh/k8s_key 2>&1; then
            echo "❌ SSH key format is invalid!"
            echo "Key starts with: $(head -c 50 ~/.ssh/k8s_key)"
            exit 1
          fi
          echo "✅ SSH key format is valid"

          # Add server to known hosts
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null

          # Test SSH connection
          echo "🔌 Testing SSH connection..."
          if ssh -i ~/.ssh/k8s_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 $SERVER_USER@$SERVER_IP "echo 'SSH connection successful'"; then
            echo "✅ SSH connection working"
          else
            echo "❌ SSH connection failed"
            exit 1
          fi

      - name: Create or update chatplatform-secrets
        env:
          SERVER_IP: ${{ secrets.K8S_SERVER_IP }}
          SERVER_USER: ${{ secrets.K8S_SERVER_USER }}
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          INSTAGRAM_VERIFY_TOKEN: ${{ secrets.INSTAGRAM_VERIFY_TOKEN }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          DEFAULT_FROM_EMAIL: ${{ secrets.DEFAULT_FROM_EMAIL }}
        run: |
          echo "📝 Creating/updating Kubernetes secrets..."

          # Delete existing secret if it exists (to force update)
          ssh -i ~/.ssh/k8s_key -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP \
            "kubectl delete secret chatplatform-secrets -n chatplatform --ignore-not-found=true"

          # Create secret with values from GitHub Secrets.
          # SMTP creds default to empty if you haven't set the GitHub
          # secrets yet — Django then falls back to the console backend
          # automatically (see settings.EMAIL_BACKEND).
          ssh -i ~/.ssh/k8s_key -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP \
            "kubectl create secret generic chatplatform-secrets -n chatplatform \
              --from-literal=SECRET_KEY='$SECRET_KEY' \
              --from-literal=POSTGRES_PASSWORD='$POSTGRES_PASSWORD' \
              --from-literal=OPENAI_API_KEY='$OPENAI_API_KEY' \
              --from-literal=META_APP_SECRET='$META_APP_SECRET' \
              --from-literal=WHATSAPP_DEFAULT_VERIFY_TOKEN='$WHATSAPP_VERIFY_TOKEN' \
              --from-literal=INSTAGRAM_DEFAULT_VERIFY_TOKEN='$INSTAGRAM_VERIFY_TOKEN' \
              --from-literal=EMAIL_HOST_USER='$EMAIL_HOST_USER' \
              --from-literal=EMAIL_HOST_PASSWORD='$EMAIL_HOST_PASSWORD' \
              --from-literal=DEFAULT_FROM_EMAIL='$DEFAULT_FROM_EMAIL'"

          echo "✅ Secrets deployed successfully"

      - name: Restart deployments to pick up new secrets
        env:
          SERVER_IP: ${{ secrets.K8S_SERVER_IP }}
          SERVER_USER: ${{ secrets.K8S_SERVER_USER }}
        run: |
          echo "🔄 Restarting deployments..."
          ssh -i ~/.ssh/k8s_key -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP \
            "kubectl rollout restart deployment backend celery-worker celery-beat -n chatplatform"
          echo "✅ Deployments restarted"

      # ──────────────────────────────────────────────────────────────
      # Re-assert the ArgoCD Application spec from Git on every deploy.
      #
      # WHY: ArgoCD's own Application object lives in the `argocd`
      # namespace and is excluded from its own sync (k8s/argocd/* is in
      # the `exclude` list of application.yaml itself, to prevent
      # self-management loops). That means if anyone toggles auto-sync
      # off in the ArgoCD UI, the live Application drifts away from
      # what's in Git and stays drifted forever — incoming pushes show
      # OutOfSync but never deploy.
      #
      # This step applies application.yaml back to the cluster on every
      # successful deploy, so auto-sync, retries, ignoreDifferences,
      # and all other policy fields are guaranteed to match Git. It's
      # idempotent: when nothing has changed, kubectl reports
      # "unchanged" and the step is a no-op.
      # ──────────────────────────────────────────────────────────────
      - name: Re-apply ArgoCD Application spec (drift protection)
        env:
          SERVER_IP: ${{ secrets.K8S_SERVER_IP }}
          SERVER_USER: ${{ secrets.K8S_SERVER_USER }}
        run: |
          echo "🛡️  Re-applying ArgoCD Application spec to prevent drift..."
          # Copy the manifest to the server, then apply it. We do this
          # over SSH because the GitHub runner has no kubeconfig for
          # this cluster — only the bastion does.
          scp -i ~/.ssh/k8s_key -o StrictHostKeyChecking=no \
            k8s/argocd/application.yaml \
            $SERVER_USER@$SERVER_IP:/tmp/argocd-application.yaml

          ssh -i ~/.ssh/k8s_key -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP \
            "kubectl apply -f /tmp/argocd-application.yaml && rm /tmp/argocd-application.yaml"

          echo "✅ ArgoCD Application spec re-asserted from Git"

  # ============================================
  # Job 5: Security Scan (Optional but Recommended)
  # ============================================
  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true  # Don't block deployment on scan failures

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub for scanning
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@0.36.0
        continue-on-error: true
        with:
          image-ref: '${{ env.BACKEND_IMAGE }}:${{ needs.build.outputs.image_tag }}'
          format: 'sarif'
          output: 'backend-trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@0.36.0
        continue-on-error: true
        with:
          image-ref: '${{ env.FRONTEND_IMAGE }}:${{ needs.build.outputs.image_tag }}'
          format: 'sarif'
          output: 'frontend-trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('backend-trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: 'backend-trivy-results.sarif'

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('frontend-trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: 'frontend-trivy-results.sarif'
          category: 'frontend'

  # ============================================
  # Job 6: Notify on Deployment
  # ============================================
  notify:
    name: Notify Deployment
    needs: [test, build, update-manifests, deploy-secrets, security-scan]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment Summary
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          DOCKER_USER="${{ secrets.DOCKER_USERNAME }}"

          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Docker Images
          echo "### 🐳 Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Image Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`${DOCKER_USER}/chatplatform-backend:${IMAGE_TAG}\` | ${{ needs.build.result == 'success' && '✅ Built' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${DOCKER_USER}/chatplatform-frontend:${IMAGE_TAG}\` | ${{ needs.build.result == 'success' && '✅ Built' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Pipeline Status
          echo "### 📋 Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result == 'success' && '✅ Passed' || needs.test.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build | ${{ needs.build.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Manifests | ${{ needs.update-manifests.result == 'success' && '✅ Updated' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Secrets | ${{ needs.deploy-secrets.result == 'success' && '✅ Deployed' || needs.deploy-secrets.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ Security Scan | ${{ needs.security-scan.result == 'success' && '✅ Passed' || needs.security-scan.result == 'skipped' && '⏭️ Skipped' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Next Steps
          echo "### 🎯 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. ⏳ ArgoCD will auto-sync within 3 minutes" >> $GITHUB_STEP_SUMMARY
          echo "2. 🔄 Kubernetes will perform rolling update" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ Zero-downtime deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Monitor**: [ArgoCD Dashboard](https://argocd.kribaat.com)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Deployment initiated at $(date -u +'%Y-%m-%d %H:%M:%S UTC') by commit ${IMAGE_TAG}_" >> $GITHUB_STEP_SUMMARY
