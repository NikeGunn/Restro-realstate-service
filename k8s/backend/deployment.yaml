# Backend (Django/Gunicorn) Deployment
# Uses rolling update strategy for zero-downtime deployments
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chatplatform
  labels:
    app.kubernetes.io/name: chatplatform
    app.kubernetes.io/component: backend
spec:
  # Pinned to 1 replica because media-pvc is ReadWriteOnce.
  # See k8s/backend/hpa.yaml for the long-form explanation.
  replicas: 1
  selector:
    matchLabels:
      app: backend
  # RollingUpdate with maxUnavailable:0 — zero downtime.
  # New pod starts and passes readiness before old pod terminates.
  # The media-pvc uses ReadWriteOncePod (see pvc.yaml) which releases
  # the volume claim at the pod level, allowing the new pod to bind
  # immediately once the old pod's preStop drain completes.
  # Migrations run as a PreSync ArgoCD Job (migrate-job.yaml) before
  # this Deployment is touched, so init containers no longer need to run
  # migrate — eliminating the Recreate requirement entirely.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: chatplatform
        app.kubernetes.io/component: backend
    spec:
      # Migrations run via ArgoCD PreSync Job (migrate-job.yaml) before
      # this Deployment is updated � no migration initContainer needed.
      initContainers:
        - name: collect-static
          image: nemo2092/chatplatform-backend:2c9a59b
          imagePullPolicy: IfNotPresent
          command:
            - python
            - manage.py
            - collectstatic
            - --noinput
          volumeMounts:
            - name: static-files
              mountPath: /app/staticfiles
          envFrom:
            - configMapRef:
                name: chatplatform-config
            - secretRef:
                name: chatplatform-secrets

      containers:
        - name: backend
          image: nemo2092/chatplatform-backend:2c9a59b
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          command:
            - gunicorn
            - config.wsgi:application
            - --bind
            - 0.0.0.0:8000
            - --workers
            - "3"
            - --threads
            - "2"
            - --timeout
            - "120"
            - --graceful-timeout
            - "30"
            - --keep-alive
            - "5"
          envFrom:
            - configMapRef:
                name: chatplatform-config
            - secretRef:
                name: chatplatform-secrets
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          volumeMounts:
            - name: static-files
              mountPath: /app/staticfiles
            - name: media-files
              mountPath: /app/media
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          # Startup probe - allows slow startup
          startupProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30  # 30 * 5s = 150s max startup time

          # Readiness probe - only receive traffic when ready
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Liveness probe - restart if unhealthy
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          # Graceful shutdown: 15s drain lets Traefik finish in-flight
          # requests before SIGTERM hits gunicorn. Must be less than
          # terminationGracePeriodSeconds minus gunicorn graceful-timeout.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      # 90s = 15s preStop + 30s gunicorn graceful-timeout + headroom
      terminationGracePeriodSeconds: 90

      volumes:
        - name: static-files
          emptyDir: {}
        - name: media-files
          persistentVolumeClaim:
            claimName: media-pvc

      # Pod anti-affinity - spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - backend
                topologyKey: kubernetes.io/hostname
