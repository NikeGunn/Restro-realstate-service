# Backend (Django/Gunicorn) Deployment
# Uses rolling update strategy for zero-downtime deployments
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chatplatform
  labels:
    app.kubernetes.io/name: chatplatform
    app.kubernetes.io/component: backend
spec:
  # Pinned to 1 replica because media-pvc is ReadWriteOnce.
  # See k8s/backend/hpa.yaml for the long-form explanation.
  replicas: 1
  selector:
    matchLabels:
      app: backend
  # Recreate (not RollingUpdate) is required when the deployment mounts
  # an RWO PVC. RollingUpdate would try to start the new pod before
  # killing the old, but the old pod still has the PVC attached, so the
  # new pod hangs in ContainerCreating with "Multi-Attach error".
  # Tradeoff: ~5–10 seconds of downtime per deploy. Acceptable until we
  # migrate /app/media to S3/MinIO.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: chatplatform
        app.kubernetes.io/component: backend
    spec:
      # Init container to run migrations before main container starts
      initContainers:
        - name: run-migrations
          image: nemo2092/chatplatform-backend:021718c
          imagePullPolicy: IfNotPresent
          command:
            - python
            - manage.py
            - migrate
            - --noinput
          envFrom:
            - configMapRef:
                name: chatplatform-config
            - secretRef:
                name: chatplatform-secrets
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"

        - name: collect-static
          image: nemo2092/chatplatform-backend:021718c
          imagePullPolicy: IfNotPresent
          command:
            - python
            - manage.py
            - collectstatic
            - --noinput
          volumeMounts:
            - name: static-files
              mountPath: /app/staticfiles
          envFrom:
            - configMapRef:
                name: chatplatform-config
            - secretRef:
                name: chatplatform-secrets

      containers:
        - name: backend
          image: nemo2092/chatplatform-backend:021718c
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          command:
            - gunicorn
            - config.wsgi:application
            - --bind
            - 0.0.0.0:8000
            - --workers
            - "3"
            - --threads
            - "2"
            - --timeout
            - "120"
            - --graceful-timeout
            - "30"
            - --keep-alive
            - "5"
          envFrom:
            - configMapRef:
                name: chatplatform-config
            - secretRef:
                name: chatplatform-secrets
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          volumeMounts:
            - name: static-files
              mountPath: /app/staticfiles
            - name: media-files
              mountPath: /app/media
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          # Startup probe - allows slow startup
          startupProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30  # 30 * 5s = 150s max startup time

          # Readiness probe - only receive traffic when ready
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Liveness probe - restart if unhealthy
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          # Graceful shutdown
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

      # Graceful termination
      terminationGracePeriodSeconds: 60

      volumes:
        - name: static-files
          emptyDir: {}
        - name: media-files
          persistentVolumeClaim:
            claimName: media-pvc

      # Pod anti-affinity - spread replicas across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - backend
                topologyKey: kubernetes.io/hostname
