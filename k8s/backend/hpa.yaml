# Horizontal Pod Autoscaler for Backend
# Automatically scales pods based on CPU/memory usage
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: chatplatform
  labels:
    app.kubernetes.io/name: chatplatform
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  # Pinned to 1/1 because the media-pvc PersistentVolumeClaim is
  # ReadWriteOnce (local-path on K3s). Multiple replicas cannot mount
  # the same RWO volume, so scaling > 1 leaves N-1 pods with empty
  # /app/media — uploads land on one pod, the celery worker reads from
  # the PVC, and any pod that didn't write the upload fails the parse
  # with "No such file or directory".
  #
  # Permanent capacity solution when this stack outgrows 1 backend:
  # migrate /app/media to S3/MinIO via django-storages, then bump
  # min/max back up.
  minReplicas: 1
  maxReplicas: 1
  metrics:
    # Scale based on CPU usage
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale based on memory usage
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    # Scale up quickly
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    # Scale down slowly
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
