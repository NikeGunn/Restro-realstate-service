# Persistent Volume Claim for media files
# Used by backend for user uploads
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: chatplatform
  labels:
    app.kubernetes.io/name: chatplatform
    app.kubernetes.io/component: storage
spec:
  # ReadWriteOnce — note: changing this on a bound PVC requires delete+recreate
  # (immutable field). RollingUpdate works with RWO too on a single-node cluster
  # because both old and new pods land on the same node, so there's no
  # cross-node Multi-Attach conflict. The preStop drain + terminationGracePeriod
  # ensure the old pod releases before the new pod mounts.
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
