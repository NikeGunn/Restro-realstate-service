# Persistent Volume Claim for media files
# Used by backend for user uploads
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-pvc
  namespace: chatplatform
  labels:
    app.kubernetes.io/name: chatplatform
    app.kubernetes.io/component: storage
spec:
  # ReadWriteOncePod (GA since K8s 1.29, running 1.34) — volume is released
  # at the pod level, not the node level. This lets RollingUpdate work:
  # the new pod can bind the PVC as soon as the old pod's preStop drain
  # completes and the old pod terminates, with no node-level lock blocking.
  accessModes:
    - ReadWriteOncePod
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
