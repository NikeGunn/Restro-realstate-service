# Celery Worker Deployment
# Processes async tasks from Redis queue
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: chatplatform
  labels:
    app.kubernetes.io/name: chatplatform
    app.kubernetes.io/component: celery-worker
spec:
  # Pinned to 1 replica because celery-worker shares the media-pvc
  # PersistentVolumeClaim with the backend deployment so it can read
  # uploaded import files. The PVC is ReadWriteOnce (K3s local-path),
  # so only one celery-worker pod can attach the volume — N>1 leaves
  # N-1 pods empty and breaks imports.
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  # Recreate (not RollingUpdate) — same reason as backend: an RWO PVC
  # can't be attached to a new pod while the old pod still holds it.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: celery-worker
        app.kubernetes.io/name: chatplatform
        app.kubernetes.io/component: celery-worker
    spec:
      # Mount the same media-pvc the backend writes to, so the import
      # task can read the .xlsx file the user uploaded.
      volumes:
        - name: media-files
          persistentVolumeClaim:
            claimName: media-pvc
      containers:
        - name: celery-worker
          image: nemo2092/chatplatform-backend:731a971
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - config
            - worker
            - -l
            - info
            - --concurrency=2
          envFrom:
            - configMapRef:
                name: chatplatform-config
            - secretRef:
                name: chatplatform-secrets
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          # Mount the shared media volume so this worker can read
          # uploaded import files written by the backend pod.
          volumeMounts:
            - name: media-files
              mountPath: /app/media
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          # Liveness probe using celery inspect
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - config
                - inspect
                - ping
                - --timeout
                - "10"
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 3

          # Graceful shutdown - allow tasks to complete
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "celery -A config control shutdown"

      # Allow 5 minutes for graceful shutdown (long-running tasks)
      terminationGracePeriodSeconds: 300
